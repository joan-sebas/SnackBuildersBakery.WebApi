name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup .NET 10 SDK
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        run: dotnet restore SnackBuilders.slnx

      - name: Build
        run: dotnet build SnackBuilders.slnx --no-restore

      - name: Test
        run: dotnet test SnackBuilders.slnx --no-build
