name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: snack_builders_ci
          POSTGRES_USER: snack_builders
          POSTGRES_PASSWORD: snack_builders_ci_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U snack_builders -d snack_builders_ci"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      ConnectionStrings__SnackBuildersDb: Host=localhost;Port=5432;Database=snack_builders_ci;Username=snack_builders;Password=snack_builders_ci_password

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup .NET 10 SDK
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        run: dotnet restore SnackBuilders.slnx

      - name: Build
        run: dotnet build SnackBuilders.slnx --no-restore

      - name: Install EF Core tool
        run: dotnet tool install --global dotnet-ef --version 10.0.8

      - name: Apply migrations
        run: dotnet ef database update --project src/Infrastructure/Infrastructure.csproj --startup-project src/Infrastructure/Infrastructure.csproj

      - name: Test
        run: dotnet test SnackBuilders.slnx --no-build
